services:
  - type: web
    name: review-insight-api
    env: python
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11

  - type: web
    name: review-insight-frontend
    env: node
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    envVars:
      - key: VITE_API_URL
        value: https://review-insight-api.onrender.com
