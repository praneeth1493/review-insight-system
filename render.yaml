services:
  - type: web
    name: review-insight-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python -c "import nltk; nltk.download('vader_lexicon', quiet=True); nltk.download('stopwords', quiet=True); nltk.download('wordnet', quiet=True); nltk.download('punkt', quiet=True); print('NLTK ready.')" && python main.py --no-dashboard
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
